name: PDeploy CI/CD Pipeline

# ■■ Trigger ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
on:
  push:
    branches: [ main ] # Only run when pushing to main branch
  pull_request:
    branches: [ main ] # Also run on PRs (test + build only, not deploy)

# ■■ Environment Variables ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pdeploy
  DEPLOYMENT_NAME: pdeploy

# ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
# JOB 1: TEST
# Run automated tests — fail fast before wasting time building
# ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      # Downloads your repository code to the runner
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
      # Caches pip packages to speed up future runs
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
    - name: Run pytest
      run: |
        cd app
        pytest tests/ -v --tb=short
        # -v = verbose output
        # --tb=short = shorter traceback on failure
    - name: Upload test results
      if: always() # Run even if tests fail
      run: echo "Tests completed — check output above for results"

  # ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  # JOB 2: BUILD
  # Build Docker image — only runs if all tests passed
  # ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test # Only starts if 'test' job succeeded
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      # Enables advanced Docker build features (caching, multi-platform)
    - name: Extract metadata for Docker image
      id: meta
      run: |
        echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
        # Uses first 8 characters of git commit hash as image tag
        # Example: a1b2c3d4
    - name: Build Docker image
      run: |
        docker build -t ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }} .
        docker build -t ${{ env.DOCKER_IMAGE }}:latest .
        echo "Image built successfully: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}"
    - name: Save image to cache
      uses: actions/cache@v3
      with:
        path: /tmp/docker-image.tar
        key: docker-${{ github.sha }}
        # Saves the built image so the next job can use it without rebuilding
    - name: Export image
      run: docker save ${{ env.DOCKER_IMAGE }}:latest > /tmp/docker-image.tar

  # ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  # JOB 3: PUSH
  # Push Docker image to Docker Hub
  # ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build # Only starts if 'build' job succeeded
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        # These come from GitHub repository secrets — never hardcode credentials!
    - name: Build and push both tags
      run: |
        SHA_TAG="${GITHUB_SHA::8}"
        docker build -t ${{ env.DOCKER_IMAGE }}:${SHA_TAG} -t ${{ env.DOCKER_IMAGE }}:latest .
        docker push ${{ env.DOCKER_IMAGE }}:${SHA_TAG}
        docker push ${{ env.DOCKER_IMAGE }}:latest
        echo "Pushed: ${{ env.DOCKER_IMAGE }}:${SHA_TAG}"
        echo "Pushed: ${{ env.DOCKER_IMAGE }}:latest"

  # ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  # JOB 4: DEPLOY
  # Update Kubernetes deployment with new image
  # Only runs on push to main (not on pull requests)
  # ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted # Runs on YOUR machine where Minikube is running
    needs: push # Only starts if 'push' job succeeded
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set image tag
      id: tag
      run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
    - name: Update Kubernetes deployment
      run: |
        kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
        ${{ env.DEPLOYMENT_NAME }}=${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.sha }}
        echo "Deployment updated with image tag: ${{ steps.tag.outputs.sha }}"
    - name: Wait for rollout to complete
      run: |
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=120s
        echo "Rollout completed successfully!"
    - name: Verify deployment
      run: |
        kubectl get pods
        kubectl get services
        echo "Deployment verified — new version is live!"
    - name: Print success message
      run: |
        echo "=================================="
        echo "DEPLOYMENT SUCCESSFUL!"
        echo "Image: ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.sha }}"
        echo "=================================="
