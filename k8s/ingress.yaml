apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdeploy-ingress
  annotations:
    # Use nginx ingress controller
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: pdeploy.local # Local hostname (add to /etc/hosts)
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pdeploy-service
            port:
              number: 80
